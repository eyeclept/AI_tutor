[ollama]
model_name = dolphin-mistral:latest
chunk_size = 8000
line_width = 80
summary_folder = ./texts/pdf_text_summaries
summarize_individual = True
summarize_summaries = False
# default input folder points to split PDFs
folders = ./texts/pdf_text_output  
prompt_prefix = Summarize the following text.\n\nREQUIREMENTS:\n1. Include EXACTLY one verbatim quote copied word-for-word from the text.\n2. The quote must be at least 5 consecutive words long.\n3. Do NOT modify, shorten, or paraphrase the quoted text.\n4. Enclose the quote in double quotation marks "like this".\n5. The quoted passage must appear exactly as written in the source.\n\nText:\n\n


