[main]
# Placeholder for main configurations

[processing]
# files and folders
input_pdf_dir = ./Docs/input_pdfs/SoftEngBook.pdf #TODO make work with multiple pdfs, will break if more than 1 in folder
split_output_dir = ./Docs/processing/split_pdf
text_output_dir = ./Docs/text_pdf
# Comma-separated page numbers to split PDF into chunks
# Example: 1,5,10 means pages 1-4, 5-9, 10-end
split_pages = 18,44,73,102,139,168,197,227,256,286,307,340,374,409,438,465,491,521,552,581,611,642,668,701,731

[llm]
# files and folders
summary_folder = ./Docs/text_pdf
folders = ./Docs/text_pdf  # default input folder points to split PDFs
# Control statements
summarize_individual = True
summarize_summaries = False
#llm configuration
model_name = dolphin-mistral:latest
chunk_size = 8000
line_width = 80
#prompt prefixes (pp)
summary_chunk_pp = Summarize the following text.\n\nREQUIREMENTS:\n1. Include EXACTLY one verbatim quote copied word-for-word from the text.\n2. The quote must be at least 5 consecutive words long.\n3. Do NOT modify, shorten, or paraphrase the quoted text.\n4. Enclose the quote in double quotation marks like this.\n5. The quoted passage must appear exactly as written in the source.\n\nText:\n\n
summary_refinement_pp = Combine the following chunk summaries into a single coherent and detailed summary.\n\n REQUIREMENTS:\n 1. Include multiple verbatim quotes from the source text, each at least 5 words long.\n 2. Quotes must appear exactly as written in the original text, in double quotes.\n 3. Preserve all major concepts, examples, and topics from the source.\n 4. Avoid shortening, removing, or paraphrasing important content.\n\n
# Chunk LLM runtime options
chunk_temperature = 0.2
chunk_top_p = 0.9
chunk_num_predict = 3072
chunk_num_ctx = 32768

# Refinement LLM runtime options
refine_temperature = 0.1
refine_top_p = 0.9
refine_num_predict = 4096
refine_num_ctx = 32768

